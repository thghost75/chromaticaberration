<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chromatic Aberration Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Chromatic aberration editor">
        <header class="topbar">
          <div>
            <p class="eyebrow">Image processor</p>
            <h1>Chromatic Aberration Studio</h1>
          </div>
        </header>

        <div class="editor-grid">
          <aside class="controls" aria-label="Image controls">
            <label class="upload-zone" for="imageInput" id="uploadZone">
              <span class="upload-icon" aria-hidden="true">+</span>
              <span class="upload-title">Upload image</span>
              <span class="upload-meta">PNG, JPG, GIF, or WebP</span>
              <input id="imageInput" type="file" accept="image/*" />
            </label>

            <div class="control-panel">
              <div class="control-label-row">
                <label for="strengthRange">Strength</label>
                <output id="strengthValue" for="strengthRange">2 px</output>
              </div>
              <input
                id="strengthRange"
                type="range"
                min="0"
                max="60"
                value="2"
                step="1"
              />
            </div>

            <div class="control-panel">
              <div class="control-label-row">
                <label for="angleRange">Angle</label>
                <output id="angleValue" for="angleRange">0 deg</output>
              </div>
              <input
                id="angleRange"
                type="range"
                min="0"
                max="360"
                value="0"
                step="1"
              />
            </div>

            <div class="control-panel">
              <div class="control-label-row">
                <label for="opacityRange">Opacity</label>
                <output id="opacityValue" for="opacityRange">100%</output>
              </div>
              <input
                id="opacityRange"
                type="range"
                min="0"
                max="100"
                value="100"
                step="1"
              />
            </div>

            <div class="action-stack">
              <button class="button primary" id="downloadButton" type="button" disabled>
                Download PNG
              </button>
              <button class="button secondary" id="resetButton" type="button" disabled>
                Reset image
              </button>
            </div>
          </aside>

          <section class="preview-panel" aria-label="Image preview">
            <canvas id="previewCanvas" aria-label="Edited image preview"></canvas>
            <canvas id="loupeCanvas" class="loupe" aria-hidden="true"></canvas>
            <div class="empty-state" id="emptyState">
              <span>Drop an image here or use upload</span>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
